name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'  # Trigger on push to any branch
  pull_request:
    branches:
      - '**'  # Trigger on pull requests to any branch

env:
  PYTHON_VERSION: "3.8"

jobs:
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
           
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.local/lib/python${{ env.PYTHON_VERSION }}/site-packages
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
          
      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r src/backend/requirements.txt
          pip install -r src/backend/requirements-dev.txt

  lint:
    name: Lint and Type Check
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        linter: [flake8, mypy]
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          pip install -r src/backend/requirements.txt
          pip install -r src/backend/requirements-dev.txt
      
      - name: Run ${{ matrix.linter }}
        id: lint
        run: |
          case ${{ matrix.linter }} in
            flake8)
              flake8 src test --output-file=flake8-report.txt --statistics --exit-zero
              if grep -q "^E" flake8-report.txt; then
                echo "Critical flake8 errors found!"
                exit 1
              fi
              ;;
            mypy)
              mypy src test --junit-xml=lint-report.xml --ignore-missing-imports --warn-error
              ERROR_COUNT=$(grep -c "error:" lint-report.xml || true)
              if [ "$ERROR_COUNT" -gt 0 ]; then
                echo "Found $ERROR_COUNT critical MyPy errors!"
                exit 1
              fi
              ;;
          esac
        
      - name: Upload ${{ matrix.linter }} report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.linter }}-report
          path: lint-report.*
  
  test:
    name: Run Tests
    needs: lint
    runs-on: ubuntu-latest
    env:
      COGNITO_USER_POOL_ID: mock-user-pool-id
      COGNITO_APP_CLIENT_ID: mock-client-id
      COGNITO_APP_CLIENT_SECRET: mock-client-secret
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: mock-access-key
      AWS_SECRET_ACCESS_KEY: mock-secret-key
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          pip install -r src/backend/requirements.txt
          pip install -r src/backend/requirements-dev.txt
      
      - name: Run tests with coverage
        run: |
          pytest test \
            --cov=src \
            --cov-report=term \
            --cov-report=xml
            
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: true

